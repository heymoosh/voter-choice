name: Deploy to Vercel

on:
  push:
    branches:
      - launch/production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate commit author email
        env:
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
        run: |
          echo "HEAD commit author: $AUTHOR_NAME <$AUTHOR_EMAIL>"
          case "$AUTHOR_EMAIL" in
            *@*.local|*@experiment.local|speckit@*|*@localhost|"")
              echo "::error::Vercel will block this deploy: author email '$AUTHOR_EMAIL' is not a valid GitHub-linked email."
              echo "::error::Fix your local git config and push a new commit:"
              echo "::error::  git config --global user.email \"your-github-email@example.com\""
              echo "::error::  git config --global user.name  \"Your Name\""
              echo "::error::  git config --local --unset user.email  # if overridden at repo level"
              echo "::error::  git commit --allow-empty -m \"chore: re-author HEAD with valid email\""
              echo "::error::  git push origin launch/production"
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Install Bitwarden Secrets Manager CLI
        run: |
          curl -sSLo bws.zip "https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-musl-2.0.0.zip"
          unzip -o bws.zip bws
          sudo install -m 755 bws /usr/local/bin/bws
          bws --version

      - name: Pull secrets from Bitwarden SM
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          ANTHROPIC_VOTER_API=$(bws secret get c569bc18-1095-4532-b5df-b42a00f87c2e --access-token "$BWS_ACCESS_TOKEN" --output json | jq -r '.value')
          echo "ANTHROPIC_VOTER_API=$ANTHROPIC_VOTER_API" >> "$GITHUB_ENV"
          echo "::add-mask::$ANTHROPIC_VOTER_API"

          GOOGLE_CIVIC_API_KEY=$(bws secret get 8737e327-3962-45af-b290-b42a013e1066 --access-token "$BWS_ACCESS_TOKEN" --output json | jq -r '.value')
          echo "GOOGLE_CIVIC_API_KEY=$GOOGLE_CIVIC_API_KEY" >> "$GITHUB_ENV"
          echo "::add-mask::$GOOGLE_CIVIC_API_KEY"

          GOOGLE_PLACES_API_KEY=$(bws secret get 5fb2ebf9-500f-4335-86d5-b42b016051d0 --access-token "$BWS_ACCESS_TOKEN" --output json | jq -r '.value')
          echo "NEXT_PUBLIC_GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY" >> "$GITHUB_ENV"
          echo "::add-mask::$GOOGLE_PLACES_API_KEY"

          DATABASE_URL=$(bws secret get 90abeeed-130e-4707-86ff-b446003770c2 --access-token "$BWS_ACCESS_TOKEN" --output json | jq -r '.value')
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          echo "::add-mask::$DATABASE_URL"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Set secrets on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set_env() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "::warning::$name is empty — skipping Vercel env update"
              return
            fi
            echo "$val" | vercel env add "$name" production --force --token="$VERCEL_TOKEN" \
              && echo "::notice::$name set on Vercel" \
              || echo "::error::Failed to set $name on Vercel"
          }
          set_env ANTHROPIC_VOTER_API              "$ANTHROPIC_VOTER_API"
          set_env GOOGLE_CIVIC_API_KEY             "$GOOGLE_CIVIC_API_KEY"
          set_env NEXT_PUBLIC_GOOGLE_PLACES_API_KEY "$NEXT_PUBLIC_GOOGLE_PLACES_API_KEY"
          set_env KV_REST_API_URL                  "$KV_REST_API_URL"
          set_env KV_REST_API_TOKEN                "$KV_REST_API_TOKEN"
          set_env UPSTASH_REDIS_REST_URL           "$UPSTASH_REDIS_REST_URL"
          set_env UPSTASH_REDIS_REST_TOKEN         "$UPSTASH_REDIS_REST_TOKEN"
          set_env DATABASE_URL                     "$DATABASE_URL"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes --token="$VERCEL_TOKEN"
