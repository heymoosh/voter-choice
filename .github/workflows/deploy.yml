name: Deploy to Vercel

on:
  push:
    branches:
      - launch/production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Install Bitwarden Secrets Manager CLI
        run: |
          curl -sSLo bws.zip "https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-musl-2.0.0.zip"
          unzip -o bws.zip bws
          sudo install -m 755 bws /usr/local/bin/bws
          bws --version

      - name: Pull secrets from Bitwarden SM
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          ANTHROPIC_VOTER_API=$(bws secret get ANTHROPIC_VOTER_API --access-token "$BWS_ACCESS_TOKEN" --output json 2>/dev/null | jq -r '.value // empty' || true)
          if [ -n "$ANTHROPIC_VOTER_API" ]; then
            echo "ANTHROPIC_VOTER_API=$ANTHROPIC_VOTER_API" >> "$GITHUB_ENV"
            echo "::add-mask::$ANTHROPIC_VOTER_API"
          fi
          GOOGLE_CIVIC_API_KEY=$(bws secret get GOOGLE_CIVIC_API_KEY --access-token "$BWS_ACCESS_TOKEN" --output json 2>/dev/null | jq -r '.value // empty' || true)
          if [ -n "$GOOGLE_CIVIC_API_KEY" ]; then
            echo "GOOGLE_CIVIC_API_KEY=$GOOGLE_CIVIC_API_KEY" >> "$GITHUB_ENV"
            echo "::add-mask::$GOOGLE_CIVIC_API_KEY"
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Set secrets on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$ANTHROPIC_VOTER_API" ]; then
            echo "$ANTHROPIC_VOTER_API" | vercel env add ANTHROPIC_VOTER_API production --force --token="$VERCEL_TOKEN" 2>/dev/null || true
          fi
          if [ -n "$GOOGLE_CIVIC_API_KEY" ]; then
            echo "$GOOGLE_CIVIC_API_KEY" | vercel env add GOOGLE_CIVIC_API_KEY production --force --token="$VERCEL_TOKEN" 2>/dev/null || true
          fi

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes --token="$VERCEL_TOKEN"
