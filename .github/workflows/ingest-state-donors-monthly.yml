name: Ingest State Donor Data (Monthly)

on:
  # 2nd of each month at 10:00 UTC.
  schedule:
    - cron: "0 10 2 * *"
  workflow_dispatch:

# -----------------------------------------------------------------------
# Status key
# -----------------------------------------------------------------------
# ACTIVE            — runs fully automatically.
# BROWSER_REQUIRED  — direct download URL not confirmed; skips in CI with
#                     a warning. To activate: find the direct curl URL,
#                     set browser_required: "false", add pre_download curl.
# PLAYWRIGHT        — WAF/JS blocks headless; run locally or via agent.
# PYTHON SCRAPER    — companion Python script required; run locally.
#
# State | Status          | Notes
# ------|-----------------|-----------------------------------------------
# AK    | BROWSER_REQUIRED| aws.state.ak.us requires devtools export trick
# AL    | ACTIVE ✓        | auto-downloads from public FCPA page
# AR    | BROWSER_REQUIRED| Angular event handler, no direct URL
# AZ    | ACTIVE ✓        | SeeTheMoney export API
# CA    | ACTIVE ✓        | CalAccess CDN ZIP (daily refresh)
# CO    | BROWSER_REQUIRED| TRACER SSL cert issue; confirm curl URL
# CT    | ACTIVE ✓        | SEEC XLSX download + Python conversion
# DE    | PYTHON SCRAPER  |
# FL    | BROWSER_REQUIRED| Cloudflare on dos.fl.gov requires Playwright
# GA    | PYTHON SCRAPER  |
# HI    | BROWSER_REQUIRED| No bulk CSV export found
# IA    | ACTIVE ✓        | Iowa Socrata API
# ID    | ACTIVE ✓        | Idaho POST API (same pattern as VT/MD)
# IL    | PYTHON SCRAPER  |
# IN    | BROWSER_REQUIRED| BulkDataDownloads directory returns 403
# KS    | PLAYWRIGHT      | WAF blocks headless
# KY    | BROWSER_REQUIRED| Incapsula WAF on secure.kentucky.gov
# LA    | PYTHON SCRAPER  |
# MA    | BROWSER_REQUIRED| OCPF Azure Blob reports.zip filename unconfirmed
# MD    | ACTIVE ✓        | Maryland POST API
# ME    | ACTIVE ✓        | Maine CFIS REST API
# MI    | BROWSER_REQUIRED| Entellitrak URL returns system exception
# MN    | BROWSER_REQUIRED| CFB download uses dynamic JS parameter
# MO    | BROWSER_REQUIRED| mec.mo.gov form-based POST, no direct URL
# MS    | BROWSER_REQUIRED| Online filing disabled since 2023; no current data
# MT    | ACTIVE ✓        | CERS public search, session auto-bootstrapped
# NC    | BROWSER_REQUIRED| cf.ncsbe.gov session-based API
# ND    | BROWSER_REQUIRED| Browser session required
# NE    | ACTIVE (weekly) | Handled by ingest-donors.yml — skipped here
# NH    | ACTIVE ✓        | NH CFS POST API (same pattern as ID/VT/MD)
# NJ    | ACTIVE ✓        | NJ ELEC search API
# NM    | PYTHON SCRAPER  |
# NV    | PYTHON SCRAPER  |
# NY    | BROWSER_REQUIRED| publicreporting.elections.ny.gov returns 403
# OH    | BROWSER_REQUIRED| Cloudflare on ohiosos.gov
# OK    | BROWSER_REQUIRED| BulkDataDownloads directory returns 403
# OR    | PLAYWRIGHT      | WAF blocks headless
# PA    | ACTIVE ✓        | PA DOS full export ZIP
# RI    | PYTHON SCRAPER  |
# SC    | BROWSER_REQUIRED| Queue-IT WAF on ethicsfiling.sc.gov
# SD    | PYTHON SCRAPER  |
# TN    | BROWSER_REQUIRED| tncamp batch browser search required
# TX    | BROWSER_REQUIRED| TEC ZIP URL not confirmed (404 on direct guess)
# UT    | ACTIVE ✓        | disclosures.utah.gov direct CSV export
# VA    | ACTIVE ✓        | VA SBE API
# VT    | ACTIVE ✓        | Vermont POST API
# WA    | ACTIVE ✓        | data.wa.gov Socrata API
# WI    | ACTIVE ✓        | Wisconsin CFIS tRPC API
# WV    | ACTIVE ✓        | WV CFRS two-step S3 API, no auth
# WY    | PYTHON SCRAPER  |
# -----------------------------------------------------------------------

jobs:
  ingest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:

          # ================================================================
          # ACTIVE — download automatically and run
          # ================================================================

          - state: Alabama
            script: al-fcpa-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: Arizona
            script: az-seethemoney-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: California
            script: ca-calaccess-donors.ts
            browser_required: "false"
            source_url: https://campaignfinance.cdn.sos.ca.gov/dbwebexport.zip
            pre_download: |
              curl -fsSL "https://campaignfinance.cdn.sos.ca.gov/dbwebexport.zip" \
                -o /tmp/CA_CF.zip

          - state: Connecticut
            script: ct-seec-donors.ts
            browser_required: "false"
            source_url: https://seec.ct.gov/ecrisreporting/Data/eCrisDownloads/exportdatafiles/Receipts2024ElectionYearCandidateExploratoryCommittees.xlsx
            pre_download: |
              curl -fsSL "https://seec.ct.gov/ecrisreporting/Data/eCrisDownloads/exportdatafiles/Receipts2024ElectionYearCandidateExploratoryCommittees.xlsx" -o /tmp/CT_2024.xlsx
              pip3 install -q openpyxl
              python3 -c "import openpyxl,csv; wb=openpyxl.load_workbook('/tmp/CT_2024.xlsx'); ws=wb.active; f=open('/tmp/CT_2024_candidates.csv','w',newline=''); w=csv.writer(f); [w.writerow([str(v) if v is not None else '' for v in row]) for row in ws.iter_rows(values_only=True)]"

          - state: Idaho
            script: id-donors.ts
            browser_required: "false"
            source_url: https://api-sunshine.voteidaho.gov/api/ExportData/GetExportPublicDownloadData
            pre_download: |
              curl -fsSL -X POST \
                "https://api-sunshine.voteidaho.gov/api/ExportData/GetExportPublicDownloadData" \
                -H "Content-Type: application/json" \
                -H "Referer: https://sunshine.voteidaho.gov/" \
                -H "User-Agent: Mozilla/5.0" \
                -d '{"transactionTypeCode":"TCON","type":"CSV","filingYear":"2024","openInNewTab":false}' \
                -o /tmp/ID_contributions_2024.csv

          - state: Iowa
            script: ia-iec-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: Maine
            script: me-cfis-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: Maryland
            script: md-cris-donors.ts
            browser_required: "false"
            source_url: https://api-campaignfinance.maryland.gov/api/ExportPublicData/GetExportPublicDownloadData
            pre_download: |
              curl -fsSL -X POST \
                "https://api-campaignfinance.maryland.gov/api/ExportPublicData/GetExportPublicDownloadData" \
                -H "Content-Type: application/json" \
                -H "Referer: https://campaignfinance.maryland.gov/" \
                -H "User-Agent: Mozilla/5.0" \
                -d '{"filingYear":"2024","transactionTypeCode":"TCON","type":"CSV","fileName":"MD_2024","openInNewTab":false}' \
                -o /tmp/MD_contributions_2024.csv

          - state: Montana
            script: mt-cers-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: "New Hampshire"
            script: nh-donors.ts
            browser_required: "false"
            source_url: https://cfsapi.sos.nh.gov/api/ExportData/GetExportPublicDownloadData
            pre_download: |
              curl -fsSL -X POST \
                "https://cfsapi.sos.nh.gov/api/ExportData/GetExportPublicDownloadData" \
                -H "Content-Type: application/json" \
                -H "Referer: https://cfs.sos.nh.gov/" \
                -H "User-Agent: Mozilla/5.0" \
                -d '{"transactionTypeCode":"TCON","type":"CSV","filingYear":"2024","openInNewTab":false}' \
                -o /tmp/NH_contributions_2024.csv

          - state: "New Jersey"
            script: nj-elec-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: Pennsylvania
            script: pa-dos-donors.ts
            browser_required: "false"
            source_url: https://www.pa.gov/content/dam/copapwp-pagov/en/dos/resources/voting-and-elections/campaign-finance/campaign-finance-data/2024.zip
            pre_download: |
              curl -fsSL \
                "https://www.pa.gov/content/dam/copapwp-pagov/en/dos/resources/voting-and-elections/campaign-finance/campaign-finance-data/2024.zip" \
                -o /tmp/PA_2024.zip

          - state: Utah
            script: ut-donors.ts
            browser_required: "false"
            source_url: https://disclosures.utah.gov/Search/AdvancedSearch/GenerateReport?ReportYear=2024&EntityType=PCC
            pre_download: |
              curl -fsSL \
                "https://disclosures.utah.gov/Search/AdvancedSearch/GenerateReport?ReportYear=2024&EntityType=PCC" \
                -o /tmp/UT_PCC_2024.csv

          - state: Virginia
            script: va-sbe-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: Vermont
            script: vt-donors.ts
            browser_required: "false"
            source_url: https://api.campaignfinance.vermont.gov/api/ExportData/GetExportPublicDownloadData
            pre_download: |
              curl -fsSL -X POST \
                "https://api.campaignfinance.vermont.gov/api/ExportData/GetExportPublicDownloadData" \
                -H "Content-Type: application/json" \
                -H "Referer: https://campaignfinance.vermont.gov/" \
                -H "User-Agent: Mozilla/5.0" \
                -d '{"transactionTypeCode":"TCON","type":"CSV","filingYear":"2024","openInNewTab":false}' \
                -o /tmp/VT_contributions_2024.csv

          - state: Washington
            script: wa-pdc-donors.ts
            browser_required: "false"
            pre_download: |
              curl -fsSL "https://data.wa.gov/resource/kv7h-kjye.csv?%24limit=500000&filing_year=2024" \
                -o /tmp/WA_legislative_2024.csv
              curl -fsSL "https://data.wa.gov/resource/kv7h-kjye.csv?%24limit=500000&filing_year=2026" \
                -o /tmp/WA_legislative_2026.csv

          - state: Wisconsin
            script: wi-cfis-donors.ts
            browser_required: "false"
            pre_download: ""

          - state: "West Virginia"
            script: wv-cfrs-donors.ts
            browser_required: "false"
            pre_download: ""

          # ================================================================
          # BROWSER_REQUIRED — included in matrix, skipped in CI with warning.
          # To activate: find the direct download URL, set browser_required
          # to "false", and add the curl command to pre_download.
          # ================================================================

          - state: Alaska
            script: ak-apoc-donors.ts
            browser_required: "true"
            source_url: https://aws.state.ak.us/apocreports/campaigndisclosure/CDIncome.aspx
            pre_download: ""

          - state: Arkansas
            script: ar-ethics-donors.ts
            browser_required: "true"
            source_url: https://ethics-disclosures.sos.arkansas.gov/public/cf/downloads
            pre_download: ""

          - state: Colorado
            script: co-tracer-donors.ts
            browser_required: "true"
            source_url: https://tracer.sos.colorado.gov/PublicSite/Docs/BulkDataDownloads/
            pre_download: ""

          - state: Florida
            script: fl-dos-donors.ts
            browser_required: "true"
            source_url: https://dos.elections.myflorida.com/campaign-finance/contributions/
            pre_download: ""

          - state: Hawaii
            script: hi-cfb-donors.ts
            browser_required: "true"
            source_url: https://ags.hawaii.gov/campaign/
            pre_download: ""

          - state: Indiana
            script: in-cfa-donors.ts
            browser_required: "true"
            source_url: https://campaignfinance.in.gov/PublicSite/Docs/BulkDataDownloads/
            pre_download: ""

          - state: Kentucky
            script: ky-kref-donors.ts
            browser_required: "true"
            source_url: https://secure.kentucky.gov/kref/publicsearch/ToCandidateSearch
            pre_download: ""

          - state: Massachusetts
            script: ma-ocpf-donors.ts
            browser_required: "true"
            source_url: https://ocpf2.blob.core.windows.net/downloads/data2/
            pre_download: ""

          - state: Michigan
            script: mi-cfr-donors.ts
            browser_required: "true"
            source_url: https://mi-boe.entellitrak.com/etk-mi-boe-prod/page.request.do?page=gov.mi.boe.component.cfrexport.page.cfrexportfile&id=10886
            pre_download: ""

          - state: Minnesota
            script: mn-cfb-donors.ts
            browser_required: "true"
            source_url: https://cfb.mn.gov/reports-and-data/self-help/data-downloads/campaign-finance/
            pre_download: ""

          - state: Missouri
            script: mo-mec-donors.ts
            browser_required: "true"
            source_url: https://www.mec.mo.gov/MEC/Campaign_Finance/CF_ContrCSV.aspx
            pre_download: ""

          - state: Mississippi
            script: ms-cfportal-donors.ts
            browser_required: "true"
            source_url: https://cfportal.sos.ms.gov/online/portal/cf/page/cf-search/Portal.aspx
            pre_download: ""

          - state: "North Carolina"
            script: nc-ncsbe-donors.ts
            browser_required: "true"
            source_url: https://cf.ncsbe.gov/CFTxnLkup/AdvancedSearch/
            pre_download: ""

          - state: "North Dakota"
            script: nd-cfis-donors.ts
            browser_required: "true"
            source_url: https://cf.sos.nd.gov/search/cfsearch.aspx
            pre_download: ""

          - state: "New York"
            script: ny-boe-donors.ts
            browser_required: "true"
            source_url: https://publicreporting.elections.ny.gov/DownloadCampaignFinanceData/DownloadCampaignFinanceData
            pre_download: ""

          - state: Ohio
            script: oh-sos-donors.ts
            browser_required: "true"
            source_url: https://www6.ohiosos.gov/ords/f?p=CFDISCLOSURE:73:::NO:RP:P73_TYPE:CAN:
            pre_download: ""

          - state: Oklahoma
            script: ok-ethics-donors.ts
            browser_required: "true"
            source_url: https://guardian.ok.gov/PublicSite/Docs/BulkDataDownloads/
            pre_download: ""

          - state: "South Carolina"
            script: sc-ethics-donors.ts
            browser_required: "true"
            source_url: https://ethicsfiling.sc.gov/public/campaign-reports/contributions
            pre_download: ""

          - state: Tennessee
            script: tn-camp-donors.ts
            browser_required: "true"
            source_url: https://apps.tn.gov/tncamp/public/cesearch.htm
            pre_download: ""

          - state: Texas
            script: tx-tec-donors.ts
            browser_required: "true"
            source_url: https://www.ethics.state.tx.us/data/search/cf/
            pre_download: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Bitwarden Secrets Manager CLI
        run: |
          curl -sSLo bws.zip "https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-x86_64-unknown-linux-musl-2.0.0.zip"
          unzip -o bws.zip bws
          sudo install -m 755 bws /usr/local/bin/bws
          bws --version

      - name: Pull secrets from Bitwarden SM
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          DATABASE_URL=$(bws secret get 90abeeed-130e-4707-86ff-b446003770c2 --access-token "$BWS_ACCESS_TOKEN" --output json | jq -r '.value')
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          echo "::add-mask::$DATABASE_URL"

          set +e
          WEBHOOK_SECRET=$(bws secret get <INGEST_FAILURE_WEBHOOK_BWS_SECRET_ID> --access-token "$BWS_ACCESS_TOKEN" --output json 2>/dev/null)
          WEBHOOK_STATUS=$?
          set -e
          if [ "$WEBHOOK_STATUS" -eq 0 ]; then
            INGEST_FAILURE_WEBHOOK_URL=$(echo "$WEBHOOK_SECRET" | jq -r '.value // empty')
            if [ -n "$INGEST_FAILURE_WEBHOOK_URL" ]; then
              echo "INGEST_FAILURE_WEBHOOK_URL=$INGEST_FAILURE_WEBHOOK_URL" >> "$GITHUB_ENV"
              echo "::add-mask::$INGEST_FAILURE_WEBHOOK_URL"
            fi
          fi

      - name: Download source data — ${{ matrix.state }}
        id: download
        shell: bash
        env:
          PRE_DOWNLOAD: ${{ matrix.pre_download }}
          BROWSER_REQUIRED: ${{ matrix.browser_required }}
          SOURCE_URL: ${{ matrix.source_url }}
        run: |
          if [ "$BROWSER_REQUIRED" = "true" ]; then
            echo "::warning::${{ matrix.state }} donor data requires browser session — skipped in CI. Manual download: $SOURCE_URL"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$PRE_DOWNLOAD" ]; then
            echo "$PRE_DOWNLOAD" > /tmp/pre_download.sh
            bash /tmp/pre_download.sh
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run donor ingest — ${{ matrix.state }}
        if: steps.download.outputs.skip != 'true'
        run: npx tsx scripts/ingest/${{ matrix.script }}

      - name: Notify on ingest failure
        if: failure()
        env:
          WEBHOOK: ${{ env.INGEST_FAILURE_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "INGEST_FAILURE_WEBHOOK_URL not set — skipping alert"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg state "${{ matrix.state }}" \
              --arg script "${{ matrix.script }}" \
              --arg run "${{ github.run_id }}" \
              --arg repo "${{ github.repository }}" \
              '{text: "[voter-choice donor ingest failure] state=\($state) script=\($script) repo=\($repo) run_id=\($run)"}')"
