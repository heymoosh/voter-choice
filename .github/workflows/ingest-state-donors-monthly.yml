# CT            | NEEDS DOWNLOAD STEP  (https://seec.ct.gov)
# DE            | PYTHON SCRAPER
# FL            | NEEDS DOWNLOAD STEP  (https://dos.elections.myflorida.com)
# GA            | PYTHON SCRAPER
# HI            | NEEDS DOWNLOAD STEP  (https://ags.hawaii.gov/campaign)
