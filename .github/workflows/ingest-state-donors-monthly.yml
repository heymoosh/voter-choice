# MN            | NEEDS DOWNLOAD STEP  (https://cfb.mn.gov/reports-and-data)
# MO            | NEEDS DOWNLOAD STEP  (https://mec.mo.gov)
# MS            | NEEDS DOWNLOAD STEP  (https://cfportal.sos.ms.gov)
# MT            | ACTIVE ✓ (CERS public search, session auto-bootstrapped)
# NC            | NEEDS DOWNLOAD STEP  (https://cf.ncsbe.gov)
# ND            | NEEDS DOWNLOAD STEP  (https://cfis.nd.gov)
# NE            | ACTIVE (weekly via ingest-donors.yml — skipped here)
# NH            | NEEDS DOWNLOAD STEP  (https://sos.nh.gov)
# NJ            | ACTIVE ✓ (NJ ELEC search API)
# NM            | PYTHON SCRAPER
# NV            | PYTHON SCRAPER
# NY            | NEEDS DOWNLOAD STEP  (https://publicreporting.elections.ny.gov)
# OH            | NEEDS DOWNLOAD STEP  (https://www.ohiosos.gov)
# OK            | NEEDS DOWNLOAD STEP  (https://guardian.ok.gov)
# OR            | PLAYWRIGHT (WAF blocks headless)
# PA            | NEEDS DOWNLOAD STEP  (https://www.pa.gov/agencies/dos)
# RI            | PYTHON SCRAPER
# SC            | NEEDS DOWNLOAD STEP  (https://ethicsfiling.sc.gov)
# SD            | PYTHON SCRAPER
# TN            | NEEDS DOWNLOAD STEP  (https://apps.tn.gov/tncamp-app)
# TX            | NEEDS DOWNLOAD STEP  (https://www.ethics.state.tx.us/data/search/cf/)
# UT            | NEEDS DOWNLOAD STEP  (https://disclosures.utah.gov)
# VA            | ACTIVE ✓ (VA SBE API)
# VT            | NEEDS DOWNLOAD STEP  (https://sos.vermont.gov)
# WA            | ACTIVE ✓ (data.wa.gov Socrata API — downloaded in CI)
# WI            | ACTIVE ✓ (Wisconsin CFIS tRPC API)
# WV            | ACTIVE ✓ (WV CFRS two-step S3 API, no auth required)
# WY            | PYTHON SCRAPER
# -----------------------------------------------------------------------

jobs:
  ingest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # ------------------------------------------------------------------
          # ACTIVE — auto-fetch, no pre-download needed
