# ACTIVE  — script auto-fetches its own data; runs in CI with no prep.
# NEEDS DOWNLOAD STEP — script reads from /tmp/; curl step required before
#   the script will succeed. Add the curl download URL to the job below,
#   uncomment the matrix entry, and it will be activated automatically.
# PLAYWRIGHT — requires a headed browser; run locally or via a Claude Code
#   scheduled agent (OR has WAF that blocks headless).
# PYTHON SCRAPER — requires a companion Python script; run locally.
#
# State         | Status
